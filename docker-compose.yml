services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: refapp
      POSTGRES_USER: refuser
      POSTGRES_PASSWORD: refpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refuser -d refapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://refuser:refpass@postgres:5432/refapp
      NODE_ENV: development
      PORT: 3000
      APP_VERSION: "1.0.0"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
