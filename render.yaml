services:
  - type: web
    name: reference-app-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_VERSION
        value: 1.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: reference-app-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"

databases:
  - name: reference-app-db
    databaseName: refapp
    user: refuser
    plan: free
