# 📌 MATERIAŁ: policz linie — wc -l bitbucket-pipelines.yml
# 📌 MATERIAŁ: Bitbucket używa JEDNEGO pliku, ale innej struktury niż GitLab
# Kluczowa różnica: brak natywnego "stages" z kontrolą kolejności —
# kolejność wynika z sekcji: default → branches → tags

image: node:20-alpine

definitions:
  # ─── Caches — odpowiednik GitHub cache: i GitLab cache: ───────────────
  # 📌 MATERIAŁ: Bitbucket ma predefiniowane cache types (node, pip, maven...)
  # GitHub i GitLab wymagają ręcznego definiowania ścieżek
  caches:
    npm-backend:
      key:
        files:
          - backend/package-lock.json
      path: backend/node_modules

  # ─── Services — bazy danych i inne zależności ─────────────────────────
  # 📌 MATERIAŁ: services w Bitbucket definiuje się globalnie w definitions
  # GitHub: services per-job | GitLab: services per-job | Bitbucket: globalnie
  services:
    postgres:
      image: postgres:16-alpine
      variables:
        POSTGRES_DB: refapp_test
        POSTGRES_USER: refuser
        POSTGRES_PASSWORD: refpass

  # ─── Steps — reużywalne kroki (unikalne dla Bitbucket) ────────────────
  # 📌 MATERIAŁ: anchors YAML to cecha Bitbucket której nie ma GitHub/GitLab
  # Pozwala na DRY — define once, reuse everywhere
  steps:
    - step: &test-step
        name: 🧪 Test
        caches:
          - npm-backend
        services:
          - postgres
        script:
          - cd backend
          - npm ci
          - DATABASE_URL=postgres://refuser:refpass@localhost:5432/refapp_test
            NODE_ENV=test npm test
        after-script:
          - echo "Test completed at $(date -u)"

    - step: &deploy-step
        name: 🚀 Deploy to Render
        image: alpine:3.19
        script:
          - apk add --no-cache curl python3
          - echo "🚀 Triggering Render deployment..."
          - |
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            echo "Render response: $HTTP_CODE"
            if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
              echo "❌ Deploy failed: HTTP $HTTP_CODE"
              exit 1
            fi
          - echo "⏳ Waiting for deployment..."
          - |
            MAX_ATTEMPTS=30
            ATTEMPT=0
            until [ $ATTEMPT -ge $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                "$RENDER_SERVICE_URL/health" || echo "000")
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "✅ Deployment live!"
                break
              fi
              if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
                echo "❌ Timeout"
                exit 1
              fi
              sleep 10
            done
          - echo "🔍 Smoke test..."
          - |
            HEALTH=$(curl -s "$RENDER_SERVICE_URL/health")
            echo "Health: $HEALTH"
            echo "$HEALTH" | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['status'] == 'healthy', f'Got: {d[\"status\"]}'
            print('✅ Smoke test passed')
            "
        # 📌 MATERIAŁ: Bitbucket Deployments — odpowiednik GitLab environments
        # Mniej rozbudowany niż GitLab, ale bardziej natywny niż GitHub Actions
        deployment: production

    - step: &pages-step
        name: 📄 Deploy to Netlify
        image: node:20-alpine
        script:
          - apk add --no-cache sed curl
          - cp frontend/src/index.html index.html
          - sed -i "s|window.PIPELINE_PLATFORM|'Bitbucket Pipelines'|g" index.html
          - |
            sed -i "s|window.DEPLOY_TIME|'$(date -u +%Y-%m-%dT%H:%M:%SZ)'|g" \
              index.html
          - sed -i "s|window.BUILD_ID|'$BITBUCKET_COMMIT'|g" index.html
          - sed -i "s|window.API_URL|'$RENDER_SERVICE_URL'|g" index.html
          # Deploy do Netlify przez CLI
          - npm install -g netlify-cli
          - netlify deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN
            --message="Bitbucket commit $BITBUCKET_COMMIT"

# ─── Pipeline flows ───────────────────────────────────────────────────────
pipelines:
  # Domyślny pipeline — odpala się na każdym branchu bez dedykowanej reguły
  # 📌 MATERIAŁ: brak odpowiednika w GitHub/GitLab — tam wszystko przez rules/on:
  default:
    - step: *test-step

  branches:
    # Pipeline dla master — test + deploy
    # 📌 MATERIAŁ: branches: to Bitbucket-specific pattern
    # GitHub używa: on: push: branches: [master]
    # GitLab używa: rules: - if: '$CI_COMMIT_BRANCH == "master"'
    master:
      - step: *test-step
      - step: *deploy-step
      - step: *pages-step

  # 📌 MATERIAŁ: pull-requests pipeline — natywna sekcja Bitbucket
  # GitHub: on: pull_request: | GitLab: rules: - if: '$CI_MERGE_REQUEST_ID'
  pull-requests:
    "**":
      - step: *test-step
